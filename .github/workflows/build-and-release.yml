name: Build and release desktop apps

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            platform: windows/amd64
            asset_name: cpa-control-center-windows-amd64.zip
          - label: macOS
            os: macos-latest
            platform: darwin/universal
            asset_name: cpa-control-center-macos-universal.zip

    env:
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Wails app
        run: wails build -clean -platform ${{ matrix.platform }}

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/cpa-control-center.exe -DestinationPath build/bin/${{ matrix.asset_name }} -Force

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH="$(find build/bin -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "$APP_PATH" ]]; then
            echo "Expected .app bundle not found in build/bin"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "build/bin/${{ matrix.asset_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          if-no-files-found: error
          path: build/bin/${{ matrix.asset_name }}

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release asset paths
        shell: bash
        run: |
          mkdir -p dist
          find release-assets -type f -maxdepth 2 -print -exec cp {} dist/ \;

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
